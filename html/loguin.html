<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión | Iron Rebel Garage</title>

  <!-- Estilos globales (variables, reset) + específicos del login -->
  <link rel="stylesheet" href="../css/cliente.css">
  <link rel="stylesheet" href="../css/loguin.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

  <main class="login-wrapper">
    <section class="login-card" aria-labelledby="loginTitle">
      <div class="login-logo">
        <a href="cliente.html">⚡ IRON REBEL GARAGE</a>
      </div>

      <h1 id="loginTitle">Iniciar sesión</h1>
      <p class="login-subtitle">Accede a tu cuenta para continuar</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="usuario">Usuario o correo</label>
          <input type="text" id="usuario" name="usuario" autocomplete="username" placeholder="admin o tu correo" required>
          <span class="error-message" id="errorUsuario"></span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-field">
            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
            <button type="button" id="togglePassword" aria-label="Mostrar contraseña">👁️</button>
          </div>
          <span class="error-message" id="errorPassword"></span>
        </div>

        <div class="login-options">
          <label class="remember">
            <input type="checkbox" id="recordar" name="recordar">
            Recordarme
          </label>
          <a href="#" id="forgotLink" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <p class="login-status" id="loginStatus" role="alert"></p>

        <button type="submit" class="login-submit" id="loginSubmit">Entrar</button>
      </form>

      <p class="login-hint">
        Demo: usa <strong>admin / admin123</strong> para entrar al panel de administración,
        o cualquier otro usuario y contraseña (mín. 4 caracteres) para entrar como cliente.
      </p>

      <p class="login-footer-link">
        <a href="cliente.html">⬅️ Volver al catálogo</a>
      </p>
    </section>
  </main>

  <script src="../js/loguin.js"></script>
</body>
</html>
